Premise: >
  {expert_roles}
  Your task is to improve the training and validation accuracy of a contrastive learning neural network model by modifying its code.
  # Neural Network Architecture
  The network consists of an encoder network that transforms insurance policies into fixed-dimensional vector embeddings.
  The encoder takes various policies as input:
  1. the training policy
  2. a positive policy (policy with the same label as the training policy)
  3. n negative policies (policies with opposite label from the training policy)
  # Training process
  The framework uses contrastive learning with the following components:
  1. Cosine Similarity Calculation: The system computes cosine similarity between the training policy embedding and all other embeddings (both similar and dissimilar)
  2. Softmax Normalization: The similarities are passed through a softmax function to create a probability distribution
  3. Cross-Entropy Loss: The final loss encourages:
  - High similarity (0.95) between the training policy and similar policies (label = 1)
  - Low similarity (0.02, 0.03) between the training policy and dissimilar policies (label = 0)
  # Use context
  This architecture is employed for Policy retrieval systems where you want to find policies similar to a query policy. 


